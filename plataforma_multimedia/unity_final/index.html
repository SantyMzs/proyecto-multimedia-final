<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="utf-8">
			<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
				<title>Coreografía Unity WebGL</title>

				<link rel="shortcut icon" href="TemplateData/favicon.ico">
					<link rel="stylesheet" href="TemplateData/style.css">

						<style>
							html, body {
							margin: 0;
							padding: 0;
							width: 100%;
							min-height: 100%;
							background: #1f2937;
							font-family: Arial, sans-serif;
							}

							body {
							display: flex;
							justify-content: center;
							align-items: flex-start;
							padding-top: 20px;
							overflow: auto;
							}

							#unity-wrapper {
							width: 1280px;
							height: 720px;
							background: #7a91a3;
							position: relative;
							overflow: hidden;
							box-shadow: 0 10px 28px rgba(0,0,0,0.35);
							}

							#unity-container {
							width: 1280px;
							height: 720px;
							position: absolute;
							left: 0;
							top: 0;
							background: #7a91a3;
							}

							#unity-canvas {
							width: 1280px !important;
							height: 720px !important;
							display: block;
							background: #7a91a3;
							border: none;
							outline: none;
							}

							#unity-loading-bar {
							position: absolute;
							left: 50%;
							top: 50%;
							transform: translate(-50%, -50%);
							z-index: 20;
							}

							#unity-warning {
							position: absolute;
							left: 0;
							top: 0;
							width: 100%;
							z-index: 30;
							}

							#unity-footer,
							#unity-fullscreen-button,
							#unity-logo-title-footer,
							#unity-build-title {
							display: none !important;
							}

							@media (max-width: 1300px) {
							#unity-wrapper {
							transform: scale(0.75);
							transform-origin: top center;
							}
							}

							@media (max-width: 1000px) {
							#unity-wrapper {
							transform: scale(0.60);
							transform-origin: top center;
							}
							}
						</style>
					</head>

	<body>

		<div id="unity-wrapper">
			<div id="unity-container" class="unity-desktop">
				<canvas id="unity-canvas" width="1280" height="720" tabindex="-1"></canvas>

				<div id="unity-loading-bar">
					<div id="unity-logo"></div>
					<div id="unity-progress-bar-empty">
						<div id="unity-progress-bar-full"></div>
					</div>
				</div>

				<div id="unity-warning"></div>
			</div>
		</div>

		<script>
			var canvas = document.querySelector("#unity-canvas");

			function unityShowBanner(msg, type) {
			var warningBanner = document.querySelector("#unity-warning");

			function updateBannerVisibility() {
			warningBanner.style.display = warningBanner.children.length ? "block" : "none";
			}

			var div = document.createElement("div");
			div.innerHTML = msg;
			warningBanner.appendChild(div);

			if (type === "error") {
			div.style = "background: red; color: white; padding: 10px;";
			} else {
			if (type === "warning") {
			div.style = "background: yellow; padding: 10px;";
			}

			setTimeout(function () {
			warningBanner.removeChild(div);
			updateBannerVisibility();
			}, 5000);
			}

			updateBannerVisibility();
			}

			var buildUrl = "Build";

			var loaderUrl = buildUrl + "/unity_final.loader.js";

			var config = {
			arguments: [],
			dataUrl: buildUrl + "/unity_final.data",
			frameworkUrl: buildUrl + "/unity_final.framework.js",
			codeUrl: buildUrl + "/unity_final.wasm",
			streamingAssetsUrl: "StreamingAssets",
			companyName: "DefaultCompany",
			productName: "Coreografia_Unity_WebGL",
			productVersion: "0.1.0",
			showBanner: unityShowBanner
			};

			config.devicePixelRatio = 1;
			config.matchWebGLToCanvasSize = false;

			document.querySelector("#unity-loading-bar").style.display = "block";

			var script = document.createElement("script");
			script.src = loaderUrl;

			script.onload = () => {
			createUnityInstance(canvas, config, (progress) => {
			document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
			}).then((unityInstance) => {
			document.querySelector("#unity-loading-bar").style.display = "none";
			}).catch((message) => {
			alert(message);
			});
			};

			document.body.appendChild(script);
		</script>

	</body>
</html>
